  <rect x="476" y="52" width="100" height="6" rx="3" fill="url(#bar1)"/>
  <text x="582" y="62" class="mono" font-size="10" fill="#64748b">MAX</text>

  <text x="640" y="62" class="mono" font-size="10" fill="#64748b" letter-spacing="1">MANA</text>
  <text x="676" y="62" class="mono" font-size="12" fill="#f0c040">☕☕☕☕☕</text>
