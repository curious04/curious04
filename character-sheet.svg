    <linearGradient id="topglow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffc8;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00ffc8;stop-opacity:0"/>
