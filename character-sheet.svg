  <text x="36" y="132" class="mono" font-size="10" fill="#64748b" letter-spacing="1">ORIGIN</text>
  <text x="36" y="170" class="mono" font-size="10" fill="#64748b" letter-spacing="1">FOCUS</text>
  <text x="36" y="208" class="mono" font-size="10" fill="#64748b" letter-spacing="1">WEAPON</text>
  <text x="36" y="246" class="mono" font-size="10" fill="#64748b" letter-spacing="1">MOUNT</text>
  <text x="36" y="284" class="mono" font-size="10" fill="#64748b" letter-spacing="1">PASSIVE</text>
