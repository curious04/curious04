  <text x="467" y="289" class="mono" font-size="9" fill="#64748b" letter-spacing="1">SPELL 1</text>
  <text x="467" y="308" class="sans" font-size="13" font-weight="600" fill="#00ffc8">Cloud Deploy</text>

  <rect x="638" y="270" width="186" height="50" rx="8" fill="#0f1520" stroke="#1e2a3a" stroke-width="1"/>
  <text x="653" y="289" class="mono" font-size="9" fill="#64748b" letter-spacing="1">SPELL 2</text>
  <text x="653" y="308" class="sans" font-size="13" font-weight="600" fill="#a78bfa">AI Integration</text>

  <rect x="452" y="334" width="174" height="50" rx="8" fill="#0f1520" stroke="#1e2a3a" stroke-width="1"/>
  <text x="467" y="353" class="mono" font-size="9" fill="#64748b" letter-spacing="1">SPELL 3</text>
  <text x="467" y="372" class="sans" font-size="13" font-weight="600" fill="#ff8c42">git push --force</text>

  <rect x="638" y="334" width="186" height="50" rx="8" fill="#ff5fa015" stroke="#ff5fa040" stroke-width="1"/>
  <text x="653" y="353" class="mono" font-size="9" fill="#ff5fa0" letter-spacing="1">ULTIMATE</text>
  <text x="653" y="372" class="sans" font-size="13" font-weight="600" fill="#ff5fa0">Ship at 3 AM 🔥</text>

