    <clipPath id="bar1clip"><rect x="0" y="0" width="152" height="6" rx="3"/></clipPath>
    <clipPath id="bar2clip"><rect x="0" y="0" width="119" height="6" rx="3"/></clipPath>
    <clipPath id="bar3clip"><rect x="0" y="0" width="99" height="6" rx="3"/></clipPath>
    <clipPath id="bar4clip"><rect x="0" y="0" width="146" height="6" rx="3"/></clipPath>
