  <text x="160" y="170" class="sans" font-size="13" font-weight="600" fill="#e2e8f0">Web · Mobile · Cloud · AI</text>
  <text x="160" y="208" class="sans" font-size="13" font-weight="600" fill="#e2e8f0">React + Node.js</text>
  <text x="160" y="246" class="sans" font-size="13" font-weight="600" fill="#e2e8f0">Docker Container</text>
  <text x="160" y="284" class="sans" font-size="12" font-weight="600" fill="#a78bfa">console.log() vision</text>
  <text x="160" y="322" class="sans" font-size="13" font-weight="600" fill="#ff5fa0">Ship at 3 AM 🔥</text>

